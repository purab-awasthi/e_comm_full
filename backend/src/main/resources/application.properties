# Server Port (Render compatible)
server.port=${PORT:8080}

# Database Configuration (PostgreSQL for production, H2 for local development)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (only enabled for local development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Fix circular refs (if needed)
spring.main.allow-circular-references=true
# JWT Configuration
jwt.secret=12345678901234567890123456789012
jwt.expirationMs=86400000